name: Build skills derivats

# Regenera els derivats (SKILL.md i prompt_adapter.md, **directament a producció**)
# a cada canvi d'un M3_instrument-*.md (mediacio) o M3_genere-*.md (generes) a skills/.
# Genera sortides deterministes, no crida cap LLM.
# Safety check: build_skills.py NO escriu si manquen camps Agent Skills obligatoris.
# Veure .tooling/build_skills.py i corpus-spec v2.6 §4.X.
# Des de 2026-05-26 (post-switch coordinat 11590bc): generació directa a producció,
# sense pas intermedi per _derivats_v2/.

on:
  push:
    branches: [master]
    paths:
      - 'skills/**/M3_instrument-*.md'
      - 'skills/**/M3_genere-*.md'
      - '.tooling/build_skills.py'
      - '.tooling/build_rubrica.py'
      - '.github/workflows/build-skills.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Regenerate derivats per a tots els instruments i generes
        run: |
          for md in $(find skills -type f \( -name 'M3_instrument-*.md' -o -name 'M3_genere-*.md' \)); do
            echo "→ $md"
            python .tooling/build_skills.py "$md"
          done

      - name: Regenerate rubrica.json per a tots els skills (v1.0 FROZEN 2026-06-01)
        run: |
          for md in $(find skills -type f \( -name 'M3_instrument-*.md' -o -name 'M3_genere-*.md' \)); do
            echo "→ rubrica: $md"
            python .tooling/build_rubrica.py "$md"
          done

      - name: Commit derivats actualitzats
        run: |
          set -e
          git config user.name "corpus-bot"
          git config user.email "corpus-bot@fje.edu"
          git add 'skills/' || true
          if git diff --staged --quiet; then
            echo "Cap canvi als derivats: res a commitejar."
            exit 0
          fi
          git commit -m "chore(skills): regenera SKILL.md + prompt_adapter.md + rubrica.json [skip ci]"
          # Race protection: pot haver-hi un push concorrent (p.ex. build-manifest).
          # Rebase amb fins a 3 reintents abans de rendir-se.
          for i in 1 2 3; do
            if git push; then
              echo "Push correcte (intent $i)."
              exit 0
            fi
            echo "Push rebutjat, rebase i reintento (intent $i)..."
            git pull --rebase origin master
          done
          echo "ERROR: 3 intents fallits."
          exit 1
