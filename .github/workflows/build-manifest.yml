name: Build corpus manifest

on:
  push:
    branches: [master]
    paths-ignore:
      - '_manifest.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate manifest
        run: python .github/scripts/build_manifest.py

      - name: Commit manifest
        run: |
          set -e
          git config user.name "corpus-bot"
          git config user.email "corpus-bot@fje.edu"
          git add _manifest.json
          if git diff --staged --quiet; then
            echo "Cap canvi al manifest: res a commitejar."
            exit 0
          fi
          git commit -m "chore: regenera _manifest.json [skip ci]"
          # Race protection: pot haver-hi un push concurrent (build-skills, build-relacions).
          # Rebase amb fins a 3 reintents abans de rendir-se.
          for i in 1 2 3; do
            if git push; then
              echo "Push correcte (intent $i)."
              exit 0
            fi
            echo "Push rebutjat, rebase i reintento (intent $i)..."
            git pull --rebase origin master
          done
          echo "ERROR: 3 intents fallits."
          exit 1
