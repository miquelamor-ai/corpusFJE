name: Build corpus manifest

on:
  push:
    branches: [master]
    paths-ignore:
      - '_manifest.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate manifest
        run: python .github/scripts/build_manifest.py

      - name: Commit manifest
        run: |
          git config user.name "corpus-bot"
          git config user.email "corpus-bot@fje.edu"
          git add _manifest.json
          git diff --staged --quiet || git commit -m "chore: regenera _manifest.json [skip ci]"
          git push
